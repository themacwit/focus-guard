<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusGuard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #e8e8e8; }
      .toggle-row { border-bottom-color: #2a2a2a; }
      .toggle-track { background: #333; }
      .footer { color: #666; }
    }

    .header {
      padding: 16px 16px 12px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .toggles { padding: 0 16px; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }

    .toggle-row:last-child { border-bottom: none; }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
    }

    /* CSS-only toggle switch */
    .toggle-input { position: absolute; opacity: 0; pointer-events: none; }

    .toggle-track {
      position: relative;
      width: 40px;
      height: 22px;
      background: #ccc;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .toggle-track::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-input:checked + .toggle-track {
      background: #2563eb;
    }

    .toggle-input:checked + .toggle-track::after {
      transform: translateX(18px);
    }

    .toggle-input:focus-visible + .toggle-track {
      outline: 2px solid #2563eb;
      outline-offset: 2px;
    }

    .footer {
      padding: 12px 16px;
      font-size: 11px;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">FocusGuard</div>

  <div class="toggles">
    <div class="toggle-row">
      <label class="toggle-label" for="instagramReels">Block Instagram Reels</label>
      <input class="toggle-input" type="checkbox" id="instagramReels">
      <label class="toggle-track" for="instagramReels"></label>
    </div>
    <div class="toggle-row">
      <label class="toggle-label" for="twitterFeed">Block X/Twitter Feed</label>
      <input class="toggle-input" type="checkbox" id="twitterFeed">
      <label class="toggle-track" for="twitterFeed"></label>
    </div>
  </div>

  <div class="footer">v1.0 · FocusGuard</div>

  <script src="popup.js"></script>
</body>
</html>
